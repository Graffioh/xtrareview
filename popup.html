<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 370px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1f2328;
      background: #f6f8fa;
      padding: 20px;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 18px;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #1f2328;
    }

    .subtitle {
      font-size: 11.5px;
      color: #656d76;
    }

    /* ── Section card ── */
    .section {
      background: #ffffff;
      border: 1px solid #d8dee4;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #656d76;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* ── Input groups ── */
    .input-group {
      margin-bottom: 12px;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 5px;
      color: #1f2328;
    }

    .input-group input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
      background: #f6f8fa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-group input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.12);
      background: #ffffff;
    }

    .input-group .hint {
      font-size: 10.5px;
      color: #8b949e;
      margin-top: 4px;
      line-height: 1.4;
    }

    .input-group .hint a {
      color: #0969da;
      text-decoration: none;
    }

    .input-group .hint a:hover {
      text-decoration: underline;
    }

    /* ── Status pill ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      margin-top: 8px;
      padding: 3px 10px;
      border-radius: 10px;
    }

    .status.connected {
      background: #dafbe1;
      color: #1a7f37;
    }

    .status.disconnected {
      background: #ffebe9;
      color: #cf222e;
    }

    /* ── Category chips ── */
    .category-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .cat-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 10.5px;
      font-weight: 600;
      color: #ffffff;
    }

    /* ── Test button ── */
    #test-api {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      color: #1f2328;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #test-api:hover:not(:disabled) {
      background: #eaeef2;
      border-color: #c5cdd5;
    }

    #test-api:active:not(:disabled) {
      background: #dde2e7;
    }

    #test-api:disabled {
      opacity: 0.6;
      cursor: wait;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>xtrareview</h1>
    <div class="subtitle">Learn from every code review comment</div>
  </div>

  <div class="section">
    <div class="section-label">OpenRouter API</div>
    <div class="input-group">
      <label for="api-key">API Key</label>
      <input type="password" id="api-key" placeholder="sk-or-...">
      <div class="hint">Get one free at <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></div>
      <div id="api-status"></div>
    </div>
    <div class="input-group">
      <label for="model-id">Model</label>
      <input type="text" id="model-id" placeholder="arcee-ai/trinity-large-preview:free">
      <div class="hint">Default is the free Arcee model you verified works for categorization.</div>
    </div>
    <div class="input-group">
      <button id="test-api" type="button">Test categorization</button>
      <div id="test-status" class="hint"></div>
      <div class="hint">If you reloaded the extension, refresh the GitHub PR tab too.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Categories</div>
    <div class="category-preview" id="category-preview"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
